<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HUB STORES</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #080808;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    svg { width: 100%; height: 100%; }

    /* ── Ligne d'entrée (vient de gauche) ── */
    .entry-line {
      stroke: #C9A84C;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 320;
      stroke-dashoffset: 320;
      animation: drawLine 0.7s cubic-bezier(.4,0,.2,1) 0.1s forwards;
    }

    /* ── Cintre (tracé après la ligne) ── */
    .hanger-path {
      stroke: #C9A84C;
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1400;
      stroke-dashoffset: 1400;
      animation: drawHanger 1.8s cubic-bezier(.4,0,.2,1) 0.65s forwards;
    }

    /* ── Balancement du cintre ── */
    .hanger-group {
      transform-origin: 400px 160px;
      animation: pendulum 3s cubic-bezier(.37,0,.63,1) 2.6s infinite;
    }

    /* ── Texte ── */
    .brand {
      opacity: 0;
      animation: fadeUp 1s ease 2.2s forwards;
    }

    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    @keyframes drawHanger {
      to { stroke-dashoffset: 0; }
    }

    @keyframes pendulum {
      0%   { transform: rotate(-20deg); }
      50%  { transform: rotate(20deg); }
      100% { transform: rotate(-20deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<svg viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradé or pour le texte -->
    <linearGradient id="gGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a07010"/>
      <stop offset="45%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- ══ 1. LIGNE QUI ENTRE DE GAUCHE ══
       Elle parcourt l'écran de x=-50 jusqu'à l'épaule gauche du cintre (x=220) -->
  <line class="entry-line"
        x1="-50" y1="205"
        x2="222"  y2="205"/>

  <!-- ══ 2. CINTRE (se trace depuis l'épaule gauche puis balance) ══ -->
  <g class="hanger-group">
    <path class="hanger-path"
      d="M 222,205
         C 272,200 388,170 400,167
         C 401,159 408,146 411,150
         C 414,157 406,164 400,167
         C 412,170 528,200 578,205
         L 580,318
         L 220,318
         L 222,205"
    />
  </g>

  <!-- ══ 3. TEXTE (apparaît après le tracé) ══ -->
  <g class="brand">

    <!-- HUB -->
    <text
      x="400" y="400"
      text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="80"
      font-weight="100"
      letter-spacing="32"
      fill="url(#gGold)">HUB</text>

    <!-- Ligne séparatrice fine -->
    <line x1="295" y1="416" x2="505" y2="416"
          stroke="rgba(201,168,76,0.5)" stroke-width="0.6"/>

    <!-- STORES -->
    <text
      x="403" y="440"
      text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="13"
      font-weight="300"
      letter-spacing="14"
      fill="rgba(255,255,255,0.6)">STORES</text>

  </g>
</svg>
</body>
</html>
