<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HUB STORES – Logo Animé</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ── Wrapper principal ── */
    .logo-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: wrapperFadeIn 1.2s ease forwards;
    }

    @keyframes wrapperFadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Icône SVG ── */
    .logo-icon {
      width: 130px;
      height: 130px;
      filter: drop-shadow(0 0 18px rgba(212,175,55,0.55));
      animation: iconPop 1s cubic-bezier(.34,1.56,.64,1) 0.3s both;
    }

    @keyframes iconPop {
      from { opacity: 0; transform: scale(0.4) rotate(-25deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* Rotation lente et continue de l'anneau externe */
    .ring-outer {
      transform-origin: center;
      transform-box: fill-box;
      animation: spinSlow 12s linear infinite;
    }
    @keyframes spinSlow {
      to { transform: rotate(360deg); }
    }

    /* Pulsation du cercle central */
    .center-pulse {
      transform-origin: center;
      transform-box: fill-box;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.12); opacity: 0.85; }
    }

    /* Brillance qui parcourt le cintre */
    .hanger-shine {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: shineMove 2.5s ease 1.2s forwards infinite;
    }
    @keyframes shineMove {
      0%   { stroke-dashoffset: 300; opacity: 0.9; }
      60%  { stroke-dashoffset: 0;   opacity: 1; }
      100% { stroke-dashoffset: -300; opacity: 0; }
    }

    /* Points hub qui apparaissent */
    .hub-dot {
      opacity: 0;
      animation: dotAppear 0.4s ease forwards;
    }
    .hub-dot:nth-child(1) { animation-delay: 0.9s; }
    .hub-dot:nth-child(2) { animation-delay: 1.1s; }
    .hub-dot:nth-child(3) { animation-delay: 1.3s; }
    .hub-dot:nth-child(4) { animation-delay: 1.5s; }
    .hub-dot:nth-child(5) { animation-delay: 1.7s; }
    .hub-dot:nth-child(6) { animation-delay: 1.9s; }

    @keyframes dotAppear {
      from { opacity: 0; transform: scale(0); transform-box: fill-box; transform-origin: center; }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Texte HUB ── */
    .logo-text-hub {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 14px;
      color: #D4AF37;
      text-transform: uppercase;
      line-height: 1;
      background: linear-gradient(90deg, #b8860b 0%, #ffd700 40%, #D4AF37 60%, #b8860b 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textSlideIn 0.8s cubic-bezier(.34,1.4,.64,1) 0.6s both,
                 shimmer 3s linear 1.5s infinite;
    }
    @keyframes textSlideIn {
      from { opacity: 0; letter-spacing: 40px; transform: scaleX(1.3); }
      to   { opacity: 1; letter-spacing: 14px;  transform: scaleX(1); }
    }
    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    /* ── Texte STORES ── */
    .logo-text-stores {
      font-size: 17px;
      font-weight: 300;
      letter-spacing: 10px;
      color: #ffffff;
      text-transform: uppercase;
      opacity: 0;
      animation: storesFadeUp 0.8s ease 1.1s forwards;
    }
    @keyframes storesFadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 0.88; transform: translateY(0); }
    }

    /* ── Ligne décorative ── */
    .deco-line {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #D4AF37, transparent);
      animation: lineExpand 0.9s ease 1.4s forwards;
    }
    @keyframes lineExpand {
      to { width: 220px; }
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 10.5px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      opacity: 0;
      animation: storesFadeUp 0.8s ease 1.8s forwards;
    }

    /* ── Particules dorées en fond ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #D4AF37;
      opacity: 0;
      animation: floatParticle var(--dur, 8s) ease-in-out var(--delay, 0s) infinite;
    }
    @keyframes floatParticle {
      0%   { opacity: 0;    transform: translateY(100vh) scale(0); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { opacity: 0;    transform: translateY(-10vh) scale(1.5); }
    }
  </style>
</head>
<body>

  <!-- Particules -->
  <div class="particles" id="particles"></div>

  <!-- Logo -->
  <div class="logo-wrapper">

    <!-- Icône SVG HUB STORES -->
    <svg class="logo-icon" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#b8860b"/>
          <stop offset="50%"  stop-color="#ffd700"/>
          <stop offset="100%" stop-color="#D4AF37"/>
        </linearGradient>
        <linearGradient id="goldGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#ffd700"/>
          <stop offset="100%" stop-color="#b8860b"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Anneau externe rotatif -->
      <g class="ring-outer">
        <circle cx="65" cy="65" r="60" stroke="url(#goldGrad)" stroke-width="1.2"
                stroke-dasharray="8 5" fill="none" opacity="0.5"/>
      </g>

      <!-- Anneau moyen -->
      <circle cx="65" cy="65" r="50" stroke="url(#goldGrad2)" stroke-width="1.5"
              fill="none" opacity="0.3"/>

      <!-- Cercle de fond central -->
      <circle class="center-pulse" cx="65" cy="65" r="40"
              fill="rgba(212,175,55,0.08)" stroke="url(#goldGrad)" stroke-width="1.8"/>

      <!-- ── CINTRE (hanger) ── -->
      <!-- Barre haute -->
      <path d="M35 58 Q65 40 95 58" stroke="url(#goldGrad)" stroke-width="3"
            stroke-linecap="round" fill="none" filter="url(#glow)"/>
      <!-- Côtés du cintre -->
      <path d="M35 58 L35 78 Q35 83 40 83 L90 83 Q95 83 95 78 L95 58"
            stroke="url(#goldGrad)" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Crochet -->
      <path d="M65 40 Q65 33 70 30 Q75 28 75 34 Q75 38 70 38"
            stroke="url(#goldGrad)" stroke-width="2.5"
            stroke-linecap="round" fill="none"/>

      <!-- Brillance animée sur le cintre -->
      <path class="hanger-shine"
            d="M35 58 Q65 40 95 58 L95 83 Q95 88 90 88 L40 88 Q35 88 35 83 L35 58"
            stroke="rgba(255,255,255,0.55)" stroke-width="1.5"
            stroke-linecap="round" fill="none"/>

      <!-- Points HUB (connexions) -->
      <g filter="url(#glow)">
        <circle class="hub-dot" cx="65" cy="65" r="5"   fill="url(#goldGrad)"/>
        <circle class="hub-dot" cx="50" cy="55" r="3.5" fill="#ffd700" opacity="0.85"/>
        <circle class="hub-dot" cx="80" cy="55" r="3.5" fill="#ffd700" opacity="0.85"/>
        <circle class="hub-dot" cx="45" cy="72" r="3"   fill="#D4AF37" opacity="0.7"/>
        <circle class="hub-dot" cx="85" cy="72" r="3"   fill="#D4AF37" opacity="0.7"/>
        <circle class="hub-dot" cx="65" cy="80" r="3"   fill="#D4AF37" opacity="0.7"/>
      </g>

      <!-- Lignes de connexion hub -->
      <g stroke="rgba(212,175,55,0.35)" stroke-width="1" stroke-dasharray="3 3">
        <line x1="65" y1="65" x2="50" y2="55"/>
        <line x1="65" y1="65" x2="80" y2="55"/>
        <line x1="65" y1="65" x2="45" y2="72"/>
        <line x1="65" y1="65" x2="85" y2="72"/>
        <line x1="65" y1="65" x2="65" y2="80"/>
      </g>
    </svg>

    <!-- Texte -->
    <div class="logo-text-hub">HUB</div>
    <div class="deco-line"></div>
    <div class="logo-text-stores">Stores</div>
    <div class="tagline">Mode &amp; Style · Collection</div>
  </div>

  <script>
    // Génération des particules
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left   = Math.random() * 100 + 'vw';
      p.style.setProperty('--dur',   (6 + Math.random() * 8) + 's');
      p.style.setProperty('--delay', (Math.random() * 6)      + 's');
      p.style.width  = p.style.height = (2 + Math.random() * 3) + 'px';
      container.appendChild(p);
    }
  </script>
</body>
</html>
