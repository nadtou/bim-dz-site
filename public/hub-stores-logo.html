<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HUB STORES – Logo Animé</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ── Wrapper principal ── */
    .logo-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: wrapperFadeIn 1.2s ease forwards;
    }

    @keyframes wrapperFadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Icône SVG ── */
    .logo-icon {
      width: 150px;
      height: 150px;
      filter: drop-shadow(0 0 22px rgba(212,175,55,0.6));
      animation: iconPop 1s cubic-bezier(.34,1.56,.64,1) 0.3s both;
      overflow: visible;
    }

    @keyframes iconPop {
      from { opacity: 0; transform: scale(0.3); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Anneau externe rotatif ── */
    .ring-outer {
      transform-origin: 65px 65px;
      animation: spinSlow 12s linear infinite;
    }
    @keyframes spinSlow {
      to { transform: rotate(360deg); }
    }

    /* ── T-shirt qui se balance largement ── */
    .tshirt-group {
      transform-origin: 65px 28px; /* pivot au col */
      animation: swing 2.2s ease-in-out infinite;
    }
    @keyframes swing {
      0%   { transform: rotate(0deg); }
      20%  { transform: rotate(28deg); }
      50%  { transform: rotate(-28deg); }
      80%  { transform: rotate(22deg); }
      100% { transform: rotate(0deg); }
    }

    /* Brillance qui parcourt le t-shirt */
    .tshirt-shine {
      stroke-dasharray: 450;
      stroke-dashoffset: 450;
      animation: shineMove 2.8s ease-in-out 1s infinite;
    }
    @keyframes shineMove {
      0%   { stroke-dashoffset: 450; opacity: 0.9; }
      55%  { stroke-dashoffset: 0;   opacity: 1;   }
      100% { stroke-dashoffset: -450; opacity: 0;  }
    }

    /* Reflet interne animé */
    .tshirt-fill {
      animation: fillPulse 2.2s ease-in-out infinite;
    }
    @keyframes fillPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.82; }
    }

    /* ── Texte HUB ── */
    .logo-text-hub {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 14px;
      text-transform: uppercase;
      line-height: 1;
      background: linear-gradient(90deg, #b8860b 0%, #ffd700 40%, #D4AF37 60%, #b8860b 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textSlideIn 0.8s cubic-bezier(.34,1.4,.64,1) 0.6s both,
                 shimmer 3s linear 1.5s infinite;
    }
    @keyframes textSlideIn {
      from { opacity: 0; letter-spacing: 38px; }
      to   { opacity: 1; letter-spacing: 14px; }
    }
    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    /* ── Texte STORES ── */
    .logo-text-stores {
      font-size: 17px;
      font-weight: 300;
      letter-spacing: 10px;
      color: #ffffff;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.1s forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 0.88; transform: translateY(0); }
    }

    /* ── Ligne décorative ── */
    .deco-line {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #D4AF37, transparent);
      animation: lineExpand 0.9s ease 1.4s forwards;
    }
    @keyframes lineExpand { to { width: 220px; } }

    /* ── Tagline ── */
    .tagline {
      font-size: 10.5px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.8s forwards;
    }

    /* ── Particules dorées ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: #D4AF37;
      opacity: 0;
      animation: floatParticle var(--dur, 8s) ease-in-out var(--delay, 0s) infinite;
    }
    @keyframes floatParticle {
      0%   { opacity: 0;   transform: translateY(100vh) scale(0); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { opacity: 0;   transform: translateY(-10vh) scale(1.5); }
    }
  </style>
</head>
<body>

  <!-- Particules -->
  <div class="particles" id="particles"></div>

  <!-- Logo -->
  <div class="logo-wrapper">

    <svg class="logo-icon" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#b8860b"/>
          <stop offset="45%"  stop-color="#ffd700"/>
          <stop offset="100%" stop-color="#D4AF37"/>
        </linearGradient>
        <linearGradient id="goldBody" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#ffd700"/>
          <stop offset="50%"  stop-color="#D4AF37"/>
          <stop offset="100%" stop-color="#a0700a"/>
        </linearGradient>
        <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"  stop-color="rgba(255,255,255,0)" />
          <stop offset="50%" stop-color="rgba(255,255,255,0.45)" />
          <stop offset="100%" stop-color="rgba(255,255,255,0)" />
        </linearGradient>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Masque pour le reflet interne -->
        <clipPath id="tshirtClip">
          <path d="M40 28
                   C40 28 48 20 55 18 C58 24 62 27 65 27 C68 27 72 24 75 18
                   C82 20 90 28 90 28
                   L108 40 L98 54 L88 46
                   L88 102 L42 102 L42 46
                   L32 54 L22 40 Z"/>
        </clipPath>
      </defs>

      <!-- Anneau externe rotatif -->
      <g class="ring-outer">
        <circle cx="65" cy="65" r="62" stroke="url(#goldGrad)" stroke-width="1"
                stroke-dasharray="7 5" fill="none" opacity="0.45"/>
      </g>

      <!-- Anneau moyen fixe -->
      <circle cx="65" cy="65" r="52" stroke="url(#goldGrad)" stroke-width="1.2"
              fill="none" opacity="0.25"/>

      <!-- Halo de fond -->
      <circle cx="65" cy="65" r="44" fill="rgba(212,175,55,0.07)"/>

      <!-- ══ T-SHIRT QUI SE BALANCE ══ -->
      <g class="tshirt-group" filter="url(#softGlow)">

        <!-- Corps principal du t-shirt (rempli or) -->
        <path class="tshirt-fill"
              d="M40 28
                 C40 28 48 20 55 18
                 C58 24 62 27 65 27
                 C68 27 72 24 75 18
                 C82 20 90 28 90 28
                 L108 40 L98 54 L88 46
                 L88 102 L42 102 L42 46
                 L32 54 L22 40 Z"
              fill="url(#goldBody)"
              stroke="url(#goldGrad)"
              stroke-width="1.5"
              stroke-linejoin="round"/>

        <!-- Reflet interne (diagonale claire) -->
        <g clip-path="url(#tshirtClip)">
          <rect x="30" y="10" width="30" height="110" fill="url(#shineGrad)"
                transform="rotate(-20, 65, 60)" opacity="0.5">
            <animateTransform attributeName="transform" type="translate"
              values="-80 0; 80 0; -80 0" dur="2.2s" repeatCount="indefinite"/>
          </rect>
        </g>

        <!-- Contour lumineux du t-shirt -->
        <path d="M40 28
                 C40 28 48 20 55 18
                 C58 24 62 27 65 27
                 C68 27 72 24 75 18
                 C82 20 90 28 90 28
                 L108 40 L98 54 L88 46
                 L88 102 L42 102 L42 46
                 L32 54 L22 40 Z"
              fill="none"
              stroke="rgba(255,215,0,0.9)"
              stroke-width="2"
              stroke-linejoin="round"
              filter="url(#glow)"/>

        <!-- Brillance animée (trait blanc qui parcourt) -->
        <path class="tshirt-shine"
              d="M40 28 C40 28 48 20 55 18 C58 24 62 27 65 27
                 C68 27 72 24 75 18 C82 20 90 28 90 28
                 L108 40 L98 54 L88 46 L88 102
                 L42 102 L42 46 L32 54 L22 40 Z"
              fill="none"
              stroke="rgba(255,255,255,0.65)"
              stroke-width="2"
              stroke-linejoin="round"/>

        <!-- Encolure – cercle col -->
        <ellipse cx="65" cy="19" rx="10" ry="6"
                 fill="#0a0a0f"
                 stroke="url(#goldGrad)" stroke-width="1.5"/>

        <!-- Couture centrale verticale (détail mode) -->
        <line x1="65" y1="27" x2="65" y2="100"
              stroke="rgba(0,0,0,0.25)" stroke-width="1" stroke-dasharray="4 3"/>

        <!-- Couture horizontale (buste) -->
        <line x1="44" y1="60" x2="86" y2="60"
              stroke="rgba(0,0,0,0.2)" stroke-width="1" stroke-dasharray="4 3"/>

        <!-- Logo "H" sur le t-shirt -->
        <text x="65" y="85" text-anchor="middle" font-size="13" font-weight="900"
              fill="rgba(10,10,15,0.5)" font-family="Segoe UI, Arial, sans-serif"
              letter-spacing="1">HS</text>
      </g>

    </svg>

    <!-- Texte -->
    <div class="logo-text-hub">HUB</div>
    <div class="deco-line"></div>
    <div class="logo-text-stores">Stores</div>
    <div class="tagline">Mode &amp; Style · Collection</div>
  </div>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left   = Math.random() * 100 + 'vw';
      const size = 2 + Math.random() * 3;
      p.style.width  = size + 'px';
      p.style.height = size + 'px';
      p.style.setProperty('--dur',   (6 + Math.random() * 8) + 's');
      p.style.setProperty('--delay', (Math.random() * 6) + 's');
      container.appendChild(p);
    }
  </script>
</body>
</html>
