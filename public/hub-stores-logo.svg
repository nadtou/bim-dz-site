<svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="45%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="goldBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffd700"/>
      <stop offset="50%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#a0700a"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="45%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="tshirtClip">
      <path d="M40 28 C40 28 48 20 55 18 C58 24 62 27 65 27
               C68 27 72 24 75 18 C82 20 90 28 90 28
               L108 40 L98 54 L88 46 L88 102 L42 102 L42 46 L32 54 L22 40 Z"/>
    </clipPath>
  </defs>

  <!-- Fond -->
  <rect width="300" height="160" fill="#0a0a0f" rx="14"/>

  <!-- ══ ICÔNE ══ -->
  <g transform="translate(8, 8)">
    <!-- Anneau rotatif -->
    <circle cx="65" cy="65" r="62" stroke="url(#goldGrad)" stroke-width="1"
            stroke-dasharray="7 5" fill="none" opacity="0.45">
      <animateTransform attributeName="transform" type="rotate"
        from="0 65 65" to="360 65 65" dur="12s" repeatCount="indefinite"/>
    </circle>

    <!-- Anneau fixe -->
    <circle cx="65" cy="65" r="52" stroke="#D4AF37" stroke-width="1.2"
            fill="none" opacity="0.25"/>

    <!-- Halo -->
    <circle cx="65" cy="65" r="44" fill="rgba(212,175,55,0.07)"/>

    <!-- T-SHIRT pivotant autour du col -->
    <g>
      <!-- Corps gold -->
      <path d="M40 28 C40 28 48 20 55 18 C58 24 62 27 65 27
               C68 27 72 24 75 18 C82 20 90 28 90 28
               L108 40 L98 54 L88 46 L88 102 L42 102 L42 46 L32 54 L22 40 Z"
            fill="url(#goldBody)" stroke="url(#goldGrad)" stroke-width="1.5"
            stroke-linejoin="round">
        <animateTransform attributeName="transform" type="rotate"
          values="0 65 19; 28 65 19; -28 65 19; 22 65 19; 0 65 19"
          keyTimes="0; 0.2; 0.5; 0.8; 1"
          dur="2.2s" repeatCount="indefinite"/>
      </path>

      <!-- Contour lumineux -->
      <path d="M40 28 C40 28 48 20 55 18 C58 24 62 27 65 27
               C68 27 72 24 75 18 C82 20 90 28 90 28
               L108 40 L98 54 L88 46 L88 102 L42 102 L42 46 L32 54 L22 40 Z"
            fill="none" stroke="rgba(255,215,0,0.85)" stroke-width="2"
            stroke-linejoin="round" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate"
          values="0 65 19; 28 65 19; -28 65 19; 22 65 19; 0 65 19"
          keyTimes="0; 0.2; 0.5; 0.8; 1"
          dur="2.2s" repeatCount="indefinite"/>
      </path>

      <!-- Brillance parcourant le t-shirt -->
      <path d="M40 28 C40 28 48 20 55 18 C58 24 62 27 65 27
               C68 27 72 24 75 18 C82 20 90 28 90 28
               L108 40 L98 54 L88 46 L88 102 L42 102 L42 46 L32 54 L22 40 Z"
            fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"
            stroke-linejoin="round"
            stroke-dasharray="450" stroke-dashoffset="450">
        <animate attributeName="stroke-dashoffset"
          values="450; 0; -450" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity"
          values="0; 1; 0" dur="2.8s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate"
          values="0 65 19; 28 65 19; -28 65 19; 22 65 19; 0 65 19"
          keyTimes="0; 0.2; 0.5; 0.8; 1"
          dur="2.2s" repeatCount="indefinite"/>
      </path>

      <!-- Encolure -->
      <ellipse cx="65" cy="19" rx="10" ry="6" fill="#0a0a0f"
               stroke="url(#goldGrad)" stroke-width="1.5">
        <animateTransform attributeName="transform" type="rotate"
          values="0 65 19; 28 65 19; -28 65 19; 22 65 19; 0 65 19"
          keyTimes="0; 0.2; 0.5; 0.8; 1"
          dur="2.2s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>

  <!-- ══ TEXTE ══ -->
  <g transform="translate(152, 40)">
    <text font-size="56" font-weight="900" letter-spacing="6"
          fill="url(#goldText)" y="52">HUB</text>
    <rect x="0" y="62" width="135" height="1" fill="url(#goldGrad)" opacity="0.7"/>
    <text font-size="16" font-weight="300" letter-spacing="9"
          fill="white" opacity="0.85" y="82" x="2">STORES</text>
    <text font-size="8" letter-spacing="3"
          fill="rgba(255,255,255,0.38)" y="100">MODE &amp; STYLE · COLLECTION</text>
  </g>
</svg>
