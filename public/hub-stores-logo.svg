<svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="50%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="45%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Animation anneau rotatif -->
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 65 65"
      to="360 65 65"
      dur="12s"
      repeatCount="indefinite"/>
  </defs>

  <!-- Fond sombre -->
  <rect width="300" height="160" fill="#0a0a0f" rx="14"/>

  <!-- ══ ICÔNE (gauche) ══ -->
  <g transform="translate(15, 15)">

    <!-- Anneau externe rotatif -->
    <circle cx="65" cy="65" r="60" stroke="url(#goldGrad)" stroke-width="1.2"
            stroke-dasharray="8 5" fill="none" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate"
        from="0 65 65" to="360 65 65" dur="12s" repeatCount="indefinite"/>
    </circle>

    <!-- Anneau moyen fixe -->
    <circle cx="65" cy="65" r="50" stroke="#D4AF37" stroke-width="1.2"
            fill="none" opacity="0.3"/>

    <!-- Cercle central pulsant -->
    <circle cx="65" cy="65" r="40"
            fill="rgba(212,175,55,0.08)" stroke="url(#goldGrad)" stroke-width="1.8">
      <animate attributeName="r" values="40;43;40" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.8;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Cintre – barre courbée -->
    <path d="M35 58 Q65 40 95 58" stroke="url(#goldGrad)" stroke-width="3"
          stroke-linecap="round" fill="none" filter="url(#glow)"/>
    <!-- Corps du cintre -->
    <path d="M35 58 L35 78 Q35 83 40 83 L90 83 Q95 83 95 78 L95 58"
          stroke="url(#goldGrad)" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Crochet -->
    <path d="M65 40 Q65 33 70 30 Q75 28 75 34 Q75 38 70 38"
          stroke="url(#goldGrad)" stroke-width="2.5"
          stroke-linecap="round" fill="none"/>

    <!-- Brillance animée -->
    <path d="M35 58 Q65 40 95 58 L95 83 Q95 88 90 88 L40 88 Q35 88 35 83 L35 58"
          stroke="rgba(255,255,255,0.5)" stroke-width="1.5"
          stroke-linecap="round" fill="none"
          stroke-dasharray="300" stroke-dashoffset="300">
      <animate attributeName="stroke-dashoffset"
        values="300;0;-300" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity"
        values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- Points hub -->
    <g filter="url(#glow)">
      <circle cx="65" cy="65" r="5"   fill="url(#goldGrad)">
        <animate attributeName="r" values="5;6.5;5" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="50" cy="55" r="3.5" fill="#ffd700" opacity="0.85"/>
      <circle cx="80" cy="55" r="3.5" fill="#ffd700" opacity="0.85"/>
      <circle cx="45" cy="72" r="3"   fill="#D4AF37" opacity="0.7"/>
      <circle cx="85" cy="72" r="3"   fill="#D4AF37" opacity="0.7"/>
      <circle cx="65" cy="80" r="3"   fill="#D4AF37" opacity="0.7"/>
    </g>

    <!-- Lignes connexion -->
    <g stroke="rgba(212,175,55,0.35)" stroke-width="1" stroke-dasharray="3 3">
      <line x1="65" y1="65" x2="50" y2="55"/>
      <line x1="65" y1="65" x2="80" y2="55"/>
      <line x1="65" y1="65" x2="45" y2="72"/>
      <line x1="65" y1="65" x2="85" y2="72"/>
      <line x1="65" y1="65" x2="65" y2="80"/>
    </g>
  </g>

  <!-- ══ TEXTE (droite) ══ -->
  <g transform="translate(155, 45)">
    <!-- HUB -->
    <text font-size="56" font-weight="900" letter-spacing="6"
          fill="url(#goldText)" y="50" x="0">HUB</text>

    <!-- Ligne séparatrice -->
    <rect x="0" y="62" width="130" height="1" fill="url(#goldGrad)" opacity="0.7"/>

    <!-- STORES -->
    <text font-size="16" font-weight="300" letter-spacing="9"
          fill="white" opacity="0.85" y="82" x="2">STORES</text>

    <!-- Tagline -->
    <text font-size="8" letter-spacing="3"
          fill="rgba(255,255,255,0.4)" y="100" x="0">MODE &amp; STYLE · COLLECTION</text>
  </g>
</svg>
